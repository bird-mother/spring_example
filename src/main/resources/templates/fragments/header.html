<!DOCTYPE html>

<!--이 HTML 파일에서 Thymeleaf 문법(th:)을 사용할 수 있게 선언-->
<html xmlns:th="http://www.thymeleaf.org">

<!--<head> 블록을 head라는 이름의 조각(fragment)으로 선언-->
<head th:fragment="head">

    <meta charset="UTF-8">

    <title>소통 게시판</title>

    <style>
        /*모든 요소(*)에 적용*/
        *{
            box-sizing: border-box;     /*padding과 border를 너비에 포함시킴*/
            margin: 0;      /*바깥 여백 지정(0 = 없앰)*/
            padding: 0;     /*안쪽 여백 지정(0 = 없앰)*/
        }

        /*전체 페이지에 적용*/
        body{
            font-family: '맑은 고딕', sans-serif;       /*글꼴 설정*/
            background-color: #ffb8f9;      /*배경색 지정*/
            color: #333;        /*글자색 지정*/
        }

        /*헤더 설정*/
        header{
            background-color: #d93aff;      /*헤더 배경색 지정*/
            color: deeppink;        /*글자색 지정*/
            padding: 18px 40px;     /*안쪽 여백 지정(위,아래 = 18px / 좌,우 = 40px)*/
            font-size: 22px;        /*글자 크기 지정*/
            font-weight: bold;      /*글자 굵게 지정*/
        }

        /*컨테이너*/
        .container{
            max-width: 900px;       /*최대 너비 지정*/
            margin: 30px auto;      /*위, 아래 30px 여백을 주고, 좌우는 중앙 정렬*/
            padding: 0 20px;        /*안쪽 여백 지정(위,아래 = 0 / 좌,우 = 20px)*/
        }

    </style>
</head
>
<body>
<!--이 <header> 블록을 header라는 이름의 조각(fragment)으로 선언-->
<header th:fragment="header">
<!--    /posts 주소로 이동하는 링크를 흰색 글씨로 표시함.-->
    <a href="/posts" style = "color : snow; text-decoration: none">소통 게시판</a>
</header>
</body>
</html>
