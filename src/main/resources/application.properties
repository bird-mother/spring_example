spring.application.name=spring_example

# DB 연결 설정
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/test_db
spring.datasource.username=root
spring.datasource.password=1111
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 파일 업로드 설정
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
#파일을 저장할 로컬 폴터 경로를 지정
file.upload.path=C:/uploads/

# 업로드된 이미지 파일을 브라우저에서 접근할 수 있게 경로 설정
spring.web.resources.static-locations=file:${file.upload.path},classpath:/static/