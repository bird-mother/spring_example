<!DOCTYPE html>

<!--이 HTML 파일에서 Thymeleaf 문법(th:)을 사용할 수 있게 선언-->
<html xmlns:th="http://www.thymeleaf.org">

<!--header.html의 head 조각을 가져와서 이 자리에 교체-->
<head th:replace="fragments/header :: head"></head>

<body>

<!--header.html의 header 조각을 가져와서 이 자리에 교체-->
<header th:replace="fragments/header :: header"></header>

<div class="container">

    <!--게시글 상세 영역-->
    <div class="post-detail">

        <!--게시글 제목-->
        <h2 class="post-title" th:text="${post.title}"></h2>

        <!--게시글 메타 정보-->
        <div class="post-meta">
            <span th:text="${post.userName}"></span>
            <span th:text="'👁 ' + ${post.viewCount}"></span>
        </div>

        <!--게시글 내용 - th:utext로 HTML 태그 렌더링-->
        <div class="post-content" th:utext="${post.content}"></div>

        <!--게시글 첨부파일 목록 - 첨부파일이 있을 때만 표시-->
        <div class="attachment-section"
             th:if="${attachments != null and !attachments.isEmpty()}">
            <h4>첨부파일</h4>
            <ul class="attachment-list">
                <!--첨부파일 반복 렌더링-->
                <li th:each="attachment : ${attachments}">
                    <!--파일 다운로드 링크 - 클릭 시 파일 다운로드-->
                    <a th:href="@{/api/attachments/download/{id}(id=${attachment.id})}"
                       th:text="${attachment.originalFileName}"></a>
                </li>
            </ul>
        </div>

        <!--게시글 버튼 영역-->
        <div class="post-actions">
            <!--수정 버튼 - 수정 페이지로 이동-->
            <a th:href="@{/posts/{id}/edit(id=${post.id})}">
                <button class="edit-btn">수정</button>
            </a>
            <!--삭제 버튼 - 클릭 시 삭제 확인 후 API 호출-->
            <button class="delete-btn" id="deletePostBtn">삭제</button>
            <!--목록으로 돌아가기 버튼-->
            <a href="/posts"><button class="list-btn">목록</button></a>
        </div>
    </div>

    <!--댓글 영역-->
    <div class="comment-section">

        <h3>댓글</h3>

        <!--댓글 작성 폼-->
        <div class="comment-form">
            <!--댓글 작성자 입력창-->
            <input type="text" id="commentUserName" placeholder="작성자">
            <!--댓글 내용 입력창-->
            <textarea id="commentContent" placeholder="댓글을 입력하세요"></textarea>

            <!--댓글 파일 첨부 영역-->
            <div class="file-area">
                <!--파일 선택 버튼 - 클릭 시 숨겨진 파일 입력창 열림-->
                <label class="file-btn">
                    파일/이미지 첨부
                    <!--multiple로 여러 파일 동시 선택 가능-->
                    <input type="file" id="commentFileInput"
                           multiple style="display:none;">
                </label>
                <!--선택된 파일 목록 표시 영역-->
                <div id="commentFileList" class="file-list"></div>
            </div>

            <!--댓글 작성 버튼 - id로 이벤트 처리-->
            <button class="comment-submit-btn" id="commentSubmitBtn">댓글 작성</button>
        </div>

        <!--댓글 목록-->
        <div class="comment-list">

            <!--댓글이 없을 때 메시지-->
            <div class="empty-msg"
                 th:if="${comments.isEmpty()}">댓글이 없습니다.</div>

            <!--댓글 반복 렌더링-->
            <div class="comment-item"
                 th:each="comment : ${comments}">

                <div class="comment-header">
                    <!--댓글 작성자-->
                    <span class="comment-author"
                          th:text="${comment.userName}"></span>
                </div>

                <!--댓글 내용 (기본 표시)-->
                <div class="comment-content"
                     th:id="|content-${comment.id}|"
                     th:text="${comment.content}"></div>

                <!--댓글 수정 입력창 (기본 숨김) - 태그 없이 텍스트만 표시-->
                <textarea class="comment-edit-input"
                          th:id="|edit-${comment.id}|"
                          style="display:none;"
                          th:text="${comment.content}"></textarea>

                <!--댓글 첨부파일 목록 - 댓글에 첨부파일이 있을 때만 표시-->
                <div class="comment-attachments">
                    <!--댓글 첨부파일 다운로드 링크-->
                    <a class="comment-attachment-link"
                       th:each="att : ${comment.attachments}"
                       th:href="@{/api/attachments/download/{id}(id=${att.id})}"
                       th:text="${att.originalFileName}"></a>
                </div>

                <div class="comment-actions">
                    <!--수정 버튼-->
                    <button class="comment-edit-btn"
                            th:id="|edit-btn-${comment.id}|"
                            th:onclick="|showEditForm(${comment.id})|">수정</button>
                    <!--수정 완료 버튼 (기본 숨김)-->
                    <button class="comment-save-btn"
                            th:id="|save-${comment.id}|"
                            style="display:none;"
                            th:onclick="|saveComment(${comment.id})|">완료</button>
                    <!--삭제 버튼-->
                    <button class="comment-delete-btn"
                            th:onclick="|deleteComment(${comment.id})|">삭제</button>
                </div>
            </div>
        </div>
    </div>
</div>

        font-size: 12px;            /* 글자 크기 */
    }

    /* 댓글 없을 때 메시지 */
    .empty-msg {
        padding: 20px;              /* 안쪽 여백 */
        text-align: center;         /* 가운데 정렬 */
        color: #aaa;                /* 글자색 연한 회색 */
    }
</style>

<!--post.id를 JS 변수에 담음 - Thymeleaf 변수를 JS에서 사용하기 위함-->
<script th:inline="javascript">
    const postId = /*[[${post.id}]]*/ 0;
</script>

<script>
    /* 댓글용 선택된 파일 목록을 담는 배열 */
    let commentFiles = [];

    /* 게시글 삭제 버튼 클릭 이벤트 */
    document.getElementById('deletePostBtn').addEventListener('click', function() {
        /* 삭제 확인 팝업 - 취소하면 함수 종료 */
        if (!confirm('게시글을 삭제하시겠습니까?')) return;

        /* DELETE /api/posts/{postId} 요청 */
        fetch(`/api/posts/${postId}`, { method: 'DELETE' })
            .then(() => {
                /* 삭제 성공 시 목록 페이지로 이동 */
                location.href = '/posts';
            });
    });

    /* 댓글 파일 선택 시 실행 */
    document.getElementById('commentFileInput').addEventListener('change', function() {
        /* 선택된 파일들을 배열에 추가 */
        Array.from(this.files).forEach(file => {
            commentFiles.push(file);
        });
        /* 파일 목록 화면에 렌더링 */
        renderCommentFileList();
    });

    /* 댓글 파일 목록 화면에 렌더링 */
    function renderCommentFileList() {
        const fileList = document.getElementById('commentFileList');
        /* 선택된 파일마다 태그 형태로 표시 */
        fileList.innerHTML = commentFiles.map((file, index) => `
            <div class="file-tag">
                <span>${file.name}</span>
                <button onclick="removeCommentFile(${index})">✕</button>
            </div>
        `).join('');
    }

    /* 댓글 선택된 파일 제거 */
    function removeCommentFile(index) {
        /* 해당 인덱스의 파일을 배열에서 제거 후 다시 렌더링 */
        commentFiles.splice(index, 1);
        renderCommentFileList();
    }

    /* 댓글 작성 버튼 클릭 이벤트 */
    document.getElementById('commentSubmitBtn').addEventListener('click', async function() {
        /* 입력창에서 작성자, 내용 값을 가져옴 */
        const userName = document.getElementById('commentUserName').value;
        const content = document.getElementById('commentContent').value;

        /* POST /api/posts/{postId}/comments 요청 - 댓글 저장 */
        const response = await fetch(`/api/posts/${postId}/comments`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            /* 작성자, 내용을 JSON으로 변환해서 전송 */
            body: JSON.stringify({ userName, content })
        });

        /* 저장된 댓글 객체를 JSON으로 파싱해서 comment 변수에 담음 */
        const comment = await response.json();

        /* 첨부파일이 있으면 하나씩 업로드 */
        if (commentFiles.length > 0) {
            for (const file of commentFiles) {
                const fileData = new FormData();
                /* 파일을 file 키로 담아서 전송 */
                fileData.append('file', file);
                /* POST /api/attachments/comment/{commentId} 요청 - 파일 업로드 */
                await fetch(`/api/attachments/comment/${comment.id}`, {
                    method: 'POST',
                    body: fileData
                });
            }
        }

        /* 댓글 작성 완료 후 페이지 새로고침 */
        location.reload();
    });

    /* 댓글 수정 폼 표시 */
    function showEditForm(commentId) {
        /* 댓글 내용 숨기고 수정 입력창 표시 */
        document.getElementById(`content-${commentId}`).style.display = 'none';
        document.getElementById(`edit-${commentId}`).style.display = 'block';
        document.getElementById(`save-${commentId}`).style.display = 'inline-block';
        /* 수정 중에는 수정 버튼 숨김 */
        document.getElementById(`edit-btn-${commentId}`).style.display = 'none';
    }

    /* 댓글 수정 저장 */
    function saveComment(commentId) {
        /* 수정 입력창에서 새 내용 가져옴 - textarea라서 태그 없이 텍스트만 가져옴 */
        const content = document.getElementById(`edit-${commentId}`).value;

        /* PUT /api/posts/{postId}/comments/{commentId} 요청 */
        fetch(`/api/posts/${postId}/comments/${commentId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            /* 새 내용을 JSON으로 변환해서 전송 */
            body: JSON.stringify({ content })
        }).then(() => {
            /* 수정 성공 시 페이지 새로고침 */
            location.reload();
        });
    }

    /* 댓글 삭제 */
    function deleteComment(commentId) {
        /* 삭제 확인 팝업 - 취소하면 함수 종료 */
        if (!confirm('댓글을 삭제하시겠습니까?')) return;

        /* DELETE /api/posts/{postId}/comments/{commentId} 요청 */
        fetch(`/api/posts/${postId}/comments/${commentId}`, { method: 'DELETE' })
            .then(() => {
                /* 삭제 성공 시 페이지 새로고침 */
                location.reload();
            });
    }
</script>

</body>
</html>
